<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa hàng | Gốm sứ Chị Bờ Vai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <header class="site-header">
        <div class="container header-flex">
            <a href="index.html" class="logo">Gốm sứ Chị Bờ Vai</a>
            <nav class="site-nav">
                <ul class="nav-menu">
                    <li><a href="index.html">TRANG CHỦ</a></li>
                    <li><a href="shop.html">CỬA HÀNG</a></li>
                    <li><a href="about.html">GIỚI THIỆU</a></li>
                    <li><a href="blog.html">TIN TỨC</a></li>
                    <li><a href="contact.html">LIÊN HỆ</a></li>
                    <li><a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">Tất cả sản phẩm</h1>

        <div class="product-grid">
            
            <div class="product-card">
                <div class="product-image">
                    <img src="binh-hoa.jpg" alt="Bình hoa">
                </div>
                <h3 class="product-name">Bình Hoa</h3>
                <p class="product-price">350.000đ</p>
                <button class="add-to-cart">Thêm vào giỏ</button>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="ly.jpg" alt="Ly">
                </div>
                <h3 class="product-name">Ly</h3>
                <p class="product-price">150.000đ</p>
                <button class="add-to-cart">Thêm vào giỏ</button>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="dia.jpg" alt="Đĩa">
                </div>
                <h3 class="product-name">Đĩa</h3>
                <p class="product-price">200.000đ</p>
                <button class="add-to-cart">Thêm vào giỏ</button>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="am-tra.jpg" alt="Ấm trà">
                </div>
                <h3 class="product-name">Ấm trà</h3>
                <p class="product-price">480.000đ</p>
                <button class="add-to-cart">Thêm vào giỏ</button>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="dia-trai-cay.jpg" alt="Đĩa trái cây">
                </div>
                <h3 class="product-name">Đĩa trái cây</h3>
                <p class="product-price">100.000đ</p>
                <button class="add-to-cart">Thêm vào giỏ</button>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="duong-dan-anh.jpg" alt="Tên sản phẩm">
                </div>
                <h3 class="product-name">Tên sản phẩm mới</h3>
                <p class="product-price">Giá tiền</p>
                <button class="add-to-cart">Thêm vào giỏ</button>
            </div>

        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Gốm sứ Chị Bờ Vai. Sản phẩm thủ công tâm huyết từ đất Việt.</p>
        </div>
    </footer>

</body>
</html>
