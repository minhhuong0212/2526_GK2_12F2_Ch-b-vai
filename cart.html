<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng | Gốm sứ Chị Bờ Vai</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
body { font-family: Arial; }
.container { width: 90%; margin: auto; }

.site-header {
    background: black;
    color: white;
    padding: 15px;
}

.cart-table {
    width: 100%;
    border-collapse: collapse;
}

.cart-table th, .cart-table td {
    border-bottom: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

.qty-input { width: 60px; }

.remove-btn {
    background: red;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
}

.cart-summary {
    margin-top: 20px;
    text-align: right;
}

.btn-checkout {
    background: black;
    color: white;
    padding: 10px 15px;
    border: none;
    cursor: pointer;
}

/* FORM THANH TOÁN */
.checkout-form {
    margin-top: 30px;
    border: 1px solid #ddd;
    padding: 20px;
    border-radius: 10px;
    display: none;
}

.checkout-form input, .checkout-form textarea {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
}
</style>
</head>

<body>

<header class="site-header">
<div class="container">
    <h2>🛒 Giỏ hàng</h2>
</div>
</header>

<div class="container">
    <h2>Sản phẩm đã chọn</h2>

    <table class="cart-table">
        <thead>
            <tr>
                <th>Sản phẩm</th>
                <th>Giá</th>
                <th>Số lượng</th>
                <th>Tổng</th>
                <th>Xoá</th>
            </tr>
        </thead>
        <tbody id="cart-body"></tbody>
    </table>

    <div class="cart-summary">
        <h3>Tổng tiền: <span id="total">0</span>đ</h3>
        <button class="btn-checkout" onclick="showCheckout()">Thanh toán</button>
    </div>

    <!-- FORM THANH TOÁN -->
    <div class="checkout-form" id="checkout-form">
        <h3>Thông tin khách hàng</h3>
        <input type="text" id="name" placeholder="Họ và tên">
        <input type="text" id="phone" placeholder="Số điện thoại">
        <textarea id="address" placeholder="Địa chỉ"></textarea>

        <button class="btn-checkout" onclick="checkout()">Xác nhận thanh toán</button>
    </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart() {
    let body = document.getElementById("cart-body");
    body.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
        let subtotal = item.price * item.qty;
        total += subtotal;

        body.innerHTML += `
        <tr>
            <td>${item.name}</td>
            <td>${item.price.toLocaleString()}đ</td>
            <td>
                <input type="number" value="${item.qty}" min="1"
                onchange="changeQty(${index}, this.value)" class="qty-input">
            </td>
            <td>${subtotal.toLocaleString()}đ</td>
            <td><button class="remove-btn" onclick="removeItem(${index})">X</button></td>
        </tr>
        `;
    });

    document.getElementById("total").innerText = total.toLocaleString();
}

function changeQty(index, qty) {
    cart[index].qty = Number(qty);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

// hiện form thanh toán
function showCheckout() {
    if (cart.length === 0) {
        alert("Giỏ hàng đang trống!");
        return;
    }
    document.getElementById("checkout-form").style.display = "block";
}

// xử lý thanh toán
function checkout() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    if (!name || !phone || !address) {
        alert("Vui lòng nhập đầy đủ thông tin!");
        return;
    }

    alert("🎉 Thanh toán thành công!\nCảm ơn bạn " + name);

    localStorage.removeItem("cart");
    location.reload();
}

renderCart();
</script>

</body>
</html>
