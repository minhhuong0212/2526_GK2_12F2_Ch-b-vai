<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng | Gốm sứ Chị Bờ Vai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* ===== TỔNG THỂ ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #F3E3D0; color: #333; line-height: 1.6; }
        .container { width: 90%; max-width: 1100px; margin: auto; }

        /* ===== HEADER (Đồng bộ) ===== */
        .site-header { background: #1A3263; padding: 15px 0; position: sticky; top: 0; z-index: 100; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { color: white; font-weight: bold; font-size: 20px; text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 20px; }
        .nav-menu a { color: white !important; text-decoration: none; font-size: 14px; text-transform: uppercase; font-weight: 500; }
        .nav-menu a:hover { color: #AACDDC !important; }

        /* ===== CART PAGE STYLES ===== */
        .cart-section { padding: 60px 0; }
        .cart-title { color: #1A3263; margin-bottom: 30px; text-align: center; }

        /* Bảng giỏ hàng */
        .cart-table-wrapper { background: white; border-radius: 10px; overflow-x: auto; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #F3E3D0; color: #1A3263; text-transform: uppercase; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; }

        .cart-item-info { display: flex; align-items: center; gap: 15px; }
        .cart-item-info img { width: 70px; height: 70px; object-fit: cover; border-radius: 5px; }
        .cart-item-name { font-weight: bold; color: #1A3263; }

        .qty-input { width: 50px; padding: 5px; text-align: center; border: 1px solid #ddd; border-radius: 4px; }
        .remove-btn { color: #e74c3c; cursor: pointer; border: none; background: none; font-size: 18px; }

        /* Tổng kết đơn hàng */
        .cart-summary { margin-top: 30px; display: flex; justify-content: flex-end; }
